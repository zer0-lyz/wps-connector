<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WPS Connector</title>
<style>
*{box-sizing:border-box}html,body{width:100%;height:100%;max-width:100%;overflow:hidden}body{margin:0;font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#1f2328;background:#f6f8fa}main{display:flex;flex-direction:column;gap:10px;width:100%;height:100vh;min-height:100vh;overflow:auto;padding:10px;min-width:0}header{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:start;flex:0 0 auto}h1{margin:0;font-size:17px;line-height:1.2}p{margin:3px 0 0;color:#57606a;overflow-wrap:anywhere}button{max-width:100%;min-width:0;min-height:30px;padding:6px 9px;border:1px solid #0969da;border-radius:6px;color:#fff;background:#0969da;font:inherit}button:active{transform:translateY(1px)}button.secondary{color:#24292f;border-color:#d0d7de;background:#f6f8fa}.status-card,.options-card,details{min-width:0;max-width:100%;border:1px solid #d0d7de;border-radius:8px;background:#fff}.status-card{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:10px;flex:0 0 auto}.status-card>div{display:grid;gap:2px;min-width:0;padding:8px;border:1px solid #e5e7eb;border-radius:6px;background:#fafbfc}.status-card>.wide{grid-column:1/-1}.selection-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:start}.selection-actions{display:flex;gap:6px;align-items:center}.selection-actions button{min-height:28px;padding:4px 8px}.selection-actions button[hidden]{display:none}.selection-text{display:block;margin-top:3px;white-space:pre-wrap;max-height:96px;overflow:auto}.label,label{color:#57606a;font-size:12px;font-weight:600}strong{min-width:0;overflow-wrap:anywhere;font-weight:650}.binding-card{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden}.binding-card[open]{display:flex}.binding-form{display:grid;gap:8px;padding:0 10px 10px;min-width:0;overflow:auto;min-height:0}.field-header{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;min-width:0}.field-header button{min-height:28px;padding:4px 8px}.binding-actions{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;min-width:0}.feedback{min-height:18px;color:#57606a;font-size:12px}summary{padding:8px 10px;cursor:default;font-weight:650;flex:0 0 auto}input{width:100%;max-width:100%;min-width:0;padding:8px;border:1px solid #d0d7de;border-radius:6px;font:inherit;background:#fff}.picker{position:relative;width:100%;max-width:100%;min-width:0}.picker.open{z-index:40}.picker-button{display:block;width:100%;max-width:100%;min-width:0;min-height:40px;padding:7px 32px 7px 9px;position:relative;color:#24292f;border-color:#d0d7de;background:#fff;text-align:left}.picker-button::after{content:"⌄";position:absolute;top:50%;right:10px;color:#57606a;transform:translateY(-50%)}.picker.open .picker-button::after{content:"⌃"}.picker-button-title,.picker-button-meta,.picker-option-title,.picker-option-meta{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.picker-button-title{display:block;font-weight:650;line-height:18px}.picker-button-meta{display:block;margin-top:2px;color:#57606a;font-size:12px}.picker-menu{position:static;display:grid;gap:6px;margin-top:6px;padding:8px;border:1px solid #d0d7de;border-radius:8px;background:#fff;box-shadow:none}.picker-menu[hidden]{display:none}.picker-list{display:grid;gap:5px;height:var(--picker-list-height,220px);max-height:var(--picker-list-height,220px);overflow-y:auto;overflow-x:hidden;padding-right:2px;padding-bottom:14px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}.picker-option{display:grid;gap:2px;width:100%;min-height:48px;padding:7px 8px;border:1px solid transparent;border-radius:6px;background:#fff;color:#24292f;text-align:left;align-content:center}.picker-option:hover{border-color:#d0d7de;background:#f6f8fa}.picker-option.selected{border-color:#0969da;background:#ddf4ff}.picker-option-title{display:block;font-weight:650;line-height:18px}.picker-option-meta{display:block;color:#57606a;font-size:12px;line-height:16px}.muted{color:#6b7280}.hidden-fields{display:none}
</style>
</head>
<body>
<main>
  <header><div><h1>WPS Connector</h1><p id="statusText">等待 WPS 初始化</p><p id="versionText">版本 -</p></div><button id="refreshAll" type="button">刷新</button></header>
  <section class="status-card">
    <div><span class="label">Host</span><strong id="hostValue">-</strong></div>
    <div><span class="label">当前文档</span><strong id="docValue">-</strong></div>
    <div><span class="label">绑定状态</span><strong id="bindingValue">未绑定</strong></div>
    <div><span class="label">Session</span><strong id="sessionValue">未注册</strong></div>
    <div class="wide selection-row"><div><span class="label">当前选区</span><strong id="contextValue" class="muted selection-text">-</strong></div><div class="selection-actions"><button id="confirmScope" type="button">确认选定区域</button><button id="clearScope" type="button" class="secondary" hidden>取消限定</button></div></div><div class="wide"><span class="label">操作范围</span><strong id="scopeValue" class="muted">整个文档/表格</strong></div>
  </section>
  <details class="binding-card" open>
    <summary>项目绑定</summary>
    <section class="binding-form">
      <div class="field-header"><label for="projectPickerButton">选择 Codex 项目</label><button id="refreshProjects" type="button" class="secondary">刷新</button></div>
      <div class="picker" id="projectPicker"><button id="projectPickerButton" class="picker-button" type="button">加载项目列表...</button><div id="projectPickerMenu" class="picker-menu" hidden><input id="projectFilter" placeholder="搜索项目名称或路径"><div id="projectPickerList" class="picker-list"></div></div></div>
      <div class="field-header"><label for="threadPickerButton">选择对话</label><button id="refreshThreads" type="button" class="secondary">刷新</button></div>
      <div class="picker" id="threadPicker"><button id="threadPickerButton" class="picker-button" type="button">加载对话列表...</button><div id="threadPickerMenu" class="picker-menu" hidden><input id="threadFilter" placeholder="搜索对话标题"><div id="threadPickerList" class="picker-list"></div></div></div>
      <div class="hidden-fields"><input id="projectName"><input id="projectPath"><input id="threadId"><input id="documentRole"></div>
      <div class="binding-actions"><button id="saveBinding" type="button">保存绑定</button><button id="clearBinding" type="button" class="secondary">清除绑定</button></div>
      <div id="actionFeedback" class="feedback">等待加载。</div>
    </section>
  </details>
</main>
<script src="./main.js?v=20260630-ribbon-line-icon-1"></script>
<script>
const WPS_CONNECTOR_PANE_VERSION="1.0.18";
const $=(id)=>document.getElementById(id);const state={projects:[],threads:[],sessions:[],catalogUpdatedAt:"",catalogSource:"",binding:null,drafts:{},menuOpen:false};
function esc(v){return String(v??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));}
function normPath(v){return String(v||"").replace(/\/$/,"");}
function compactPath(v){const s=String(v||"");if(s.length<=48)return s;const parts=s.split("/").filter(Boolean);return parts.length>2?`.../${parts.slice(-2).join("/")}`:`...${s.slice(-42)}`;}
function titlePreview(v){const s=String(v||"").replace(/\s+/g," ").trim();return s.length>60?`${s.slice(0,57)}...`:s;}
function pickerHtml(title,meta){return `<span class="picker-button-title">${esc(title||"未选择")}</span>${meta?`<span class="picker-button-meta">${esc(meta)}</span>`:""}`;}
function paneDocumentKey(){try{return new URLSearchParams(location.search).get("doc")||"";}catch{return"";}}
function activeSession(){const cur=window.wpsConnectorSessionInfo||{};const key=cur.documentKey||paneDocumentKey();return state.sessions.find(s=>(cur.sessionId&&s.sessionId===cur.sessionId)||(key&&s.documentKey===key))||cur||null;}
function currentBinding(){return activeSession()?.binding||state.binding||null;}function currentDocumentLabel(){const s=activeSession()||{};return s.documentName||s.documentKey||paneDocumentKey()||"-";}
function activeSessionKey(){const s=activeSession()||{};return s.sessionId||s.documentKey||paneDocumentKey()||"global";}
function currentDraft(){const k=activeSessionKey();state.drafts[k]=state.drafts[k]||{project:null,thread:null};return state.drafts[k];}
function selectedProject(){const b=currentBinding()||{};const d=currentDraft();return d.project||state.projects.find(p=>p.projectId===b.projectId||p.path===b.projectPath)||null;}
function formatContext(s){if(!s)return"-";const c=s.activeContext||{};if(c.error)return`读取失败：${c.error}`;if(s.host==="et"){const head=`${c.sheetName||""} ${c.address||""}`.trim();return [head,c.textPreview].filter(Boolean).join("\n")||"-";}if(s.host==="wpp"){const range=Number.isFinite(Number(c.start))&&Number.isFinite(Number(c.end))?`位置 ${c.start}-${c.end}`:"";return [`${c.length||0} chars selected`,range,c.textPreview].filter(Boolean).join("\n")||"-";}return JSON.stringify(c);}
function formatScope(s){const scope=s?.operationScope||{};if(scope.mode!=="selection")return"整个文档/表格";const c=scope.context||{};if(s.host==="et")return `限定选区：${[c.sheetName,c.address].filter(Boolean).join(" ")}`;if(s.host==="wpp")return `限定选区：${c.start??"?"}-${c.end??"?"} · ${c.length||0} chars`;return"限定选区";}
function setFeedback(t){$("actionFeedback").textContent=t||"";}function setStatus(t){$("statusText").textContent=t||"";}
function renderHeader(){const s=activeSession()||{};const b=currentBinding();const v=s.clientVersion||window.wpsConnectorSessionInfo?.clientVersion||WPS_CONNECTOR_PANE_VERSION;$("hostValue").textContent=s.host||window.wpsConnectorSessionInfo?.host||"-";$("docValue").textContent=currentDocumentLabel();$("bindingValue").textContent=b?.projectName||b?.projectPath||b?.threadId||b?.projectId?"已绑定":"未绑定";$("sessionValue").textContent=s.sessionId||window.wpsConnectorSessionInfo?.sessionId||"未注册";$("contextValue").textContent=formatContext(s);$("scopeValue").textContent=formatScope(s);const limited=s.operationScope?.mode==="selection";$("confirmScope").textContent=limited?"更新选定区域":"确认选定区域";$("clearScope").hidden=!limited;$("versionText").textContent=`版本 v${String(v).replace(/^v/,"")}`;}
function filteredProjects(){const f=$("projectFilter")?.value.trim().toLowerCase()||"";return state.projects.filter(it=>!f||[it.label,it.path,it.projectId].some(v=>String(v||"").toLowerCase().includes(f))).sort((a,b)=>String(a.label||a.projectId||"").localeCompare(String(b.label||b.projectId||""),"zh-Hans-CN"));}
function projectThreads(){const p=selectedProject();if(!p)return state.threads;const path=normPath(p.path||p.projectId);return state.threads.filter(it=>normPath(it.cwd)===path);}
function filteredThreads(){const f=$("threadFilter")?.value.trim().toLowerCase()||"";return projectThreads().filter(it=>!f||[it.title,it.cwd,it.id].some(v=>String(v||"").toLowerCase().includes(f))).sort((a,b)=>Number(b.updatedAt||0)-Number(a.updatedAt||0)||String(b.updatedAt||"").localeCompare(String(a.updatedAt||"")));}
function renderPickers(){renderProjects();renderThreads();const p=selectedProject();$("projectPickerButton").innerHTML=p?.projectName||p?.label||p?.projectId?pickerHtml(p.projectName||p.label||p.projectId,compactPath(p.projectPath||p.path)):pickerHtml(state.projects.length?"不指定项目":"加载项目列表...",state.projects.length?"点击选择本机 Codex 项目":"");const d=currentDraft();const t=d.thread||state.threads.find(x=>x.id===(currentBinding()?.threadId));$("threadPickerButton").innerHTML=t?.threadId||t?.id?pickerHtml(titlePreview(t.threadTitle||t.title||t.threadId||t.id),compactPath(t.threadCwd||t.cwd)):pickerHtml(filteredThreads().length?"不指定对话":"无可选对话",selectedProject()?"仅显示当前项目下的对话":"请先选择项目以缩小范围");}
function renderProjects(){const items=filteredProjects();$("projectPickerList").innerHTML=`<button class="picker-option ${!selectedProject()?"selected":""}" type="button" data-index="-1"><span class="picker-option-title">不指定项目</span><span class="picker-option-meta">仅绑定当前文档</span></button>`+items.map((it,i)=>`<button class="picker-option ${selectedProject()?.projectId===it.projectId?"selected":""}" type="button" data-index="${i}"><span class="picker-option-title">${esc(it.label||it.projectId)}</span><span class="picker-option-meta">${esc(compactPath(it.path||it.projectId||""))}</span></button>`).join("");$("projectPickerList").querySelectorAll("button").forEach(el=>el.onclick=()=>{const idx=Number(el.dataset.index);const d=currentDraft();d.project=idx<0?null:items[idx];d.thread=null;closePicker("projectPickerMenu");renderPickers();setFeedback(currentDraft().project?`已选择项目：${currentDraft().project.label||currentDraft().project.projectId}`:"已清除项目选择");});}
function renderThreads(){const items=filteredThreads();$("threadPickerList").innerHTML=`<button class="picker-option ${!currentDraft().thread?"selected":""}" type="button" data-index="-1"><span class="picker-option-title">不指定对话</span><span class="picker-option-meta">仅绑定项目或文档</span></button>`+items.map((it,i)=>`<button class="picker-option ${currentDraft().thread?.id===it.id?"selected":""}" type="button" data-index="${i}"><span class="picker-option-title">${esc(titlePreview(it.title||it.id))}</span><span class="picker-option-meta">${esc(compactPath(it.cwd||it.id||""))}</span></button>`).join("");$("threadPickerList").querySelectorAll("button").forEach(el=>el.onclick=()=>{const idx=Number(el.dataset.index);currentDraft().thread=idx<0?null:items[idx];closePicker("threadPickerMenu");renderPickers();setFeedback(currentDraft().thread?`已选择对话：${titlePreview(currentDraft().thread.title||currentDraft().thread.id)}`:"已清除对话选择");});}
function fitPicker(id){const menu=$(id);if(!menu||menu.hidden)return;menu.scrollIntoView({block:"nearest",inline:"nearest"});const list=menu.querySelector(".picker-list");if(!list)return;const top=list.getBoundingClientRect().top;const available=Math.max(96,window.innerHeight-top-18);list.style.setProperty("--picker-list-height",`${Math.min(260,available)}px`);}
function openPicker(id,inputId){closePicker(id==="projectPickerMenu"?"threadPickerMenu":"projectPickerMenu");state.menuOpen=true;$(id).hidden=false;$(id).closest(".picker")?.classList.add("open");setTimeout(()=>{fitPicker(id);$(inputId)?.focus({preventScroll:true});},0);}function closePicker(id){$(id).hidden=true;$(id).closest(".picker")?.classList.remove("open");if($("projectPickerMenu").hidden&&$("threadPickerMenu").hidden)state.menuOpen=false;}
async function withFeedback(btn,start,done,fn){const text=btn.textContent;btn.disabled=true;btn.textContent=start;setFeedback(start);try{const r=await fn();btn.textContent=done;setFeedback(done);return r}catch(e){btn.textContent="失败";setFeedback(e.message||String(e));throw e}finally{setTimeout(()=>{btn.disabled=false;btn.textContent=text},600)}}
async function fetchCatalog(refresh=false){let p,t;if(refresh){const json=await fetch("http://127.0.0.1:40215/api/catalog/refresh?ts="+Date.now(),{method:"POST",headers:{"content-type":"application/json"}}).then(r=>r.json());if(!json.ok)throw new Error(json.error?.message||"目录刷新失败");p=t=json;}else{[p,t]=await Promise.all([fetch("http://127.0.0.1:40215/api/catalog/projects?ts="+Date.now()).then(r=>r.json()),fetch("http://127.0.0.1:40215/api/catalog/threads?ts="+Date.now()).then(r=>r.json())]);if(!p.ok)throw new Error(p.error?.message||"项目加载失败");if(!t.ok)throw new Error(t.error?.message||"对话加载失败");}state.projects=p.projects||[];state.threads=t.threads||[];state.catalogUpdatedAt=p.updatedAt||t.updatedAt||"";renderPickers();setStatus(`项目 ${state.projects.length} · 当前项目对话 ${filteredThreads().length} · ${state.catalogUpdatedAt||"未同步"}`);}
async function fetchSessions(){const json=await fetch("http://127.0.0.1:40215/api/sessions?ts="+Date.now()).then(r=>r.json());if(!json.ok)throw new Error(json.error?.message||"会话加载失败");const cur=window.wpsConnectorSessionInfo||{};const key=cur.documentKey||paneDocumentKey();state.sessions=(json.sessions||[]).filter(s=>(cur.sessionId&&s.sessionId===cur.sessionId)||(key&&s.documentKey===key));state.binding=currentBinding();renderHeader();if(!state.menuOpen)renderPickers();}
async function saveBinding(btn){return withFeedback(btn,"保存中...","已保存",async()=>{const s=activeSession();if(!s?.sessionId)throw new Error("当前文档尚未注册");const b=currentBinding()||{};const d=currentDraft();const payload={binding:{...b,projectName:d.project?.label||b.projectName||"",projectPath:d.project?.path||b.projectPath||"",projectId:d.project?.projectId||b.projectId||"",threadId:d.thread?.id||b.threadId||"",threadTitle:d.thread?.title||b.threadTitle||"",threadCwd:d.thread?.cwd||b.threadCwd||"",documentName:s.documentName||"",documentKey:s.documentKey||"",host:s.host||"",updatedAt:new Date().toISOString()}};const json=await fetch(`http://127.0.0.1:40215/api/sessions/${s.sessionId}/binding`,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(payload)}).then(r=>r.json());if(!json.ok)throw new Error(json.error?.message||"保存失败");state.binding=json.binding||json.session?.binding||null;await fetchSessions();});}
async function clearBinding(btn){return withFeedback(btn,"清除中...","已清除",async()=>{const s=activeSession();if(!s?.sessionId)throw new Error("当前文档尚未注册");const json=await fetch(`http://127.0.0.1:40215/api/sessions/${s.sessionId}/binding`,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({binding:{}})}).then(r=>r.json());if(!json.ok)throw new Error(json.error?.message||"清除失败");state.binding=null;state.drafts[activeSessionKey()]={project:null,thread:null};await fetchSessions();});}
async function setOperationScope(mode,btn){return withFeedback(btn,mode==="selection"?"确认中...":"取消中...",mode==="selection"?"已限定":"已取消",async()=>{const s=activeSession();if(!s?.sessionId)throw new Error("当前文档尚未注册");const context=s.activeContext||{};if(mode==="selection"&&s.host==="wpp"&&!(Number(context.length)>0))throw new Error("当前没有可确认的文字选区");if(mode==="selection"&&s.host==="et"&&!context.address)throw new Error("当前没有可确认的表格选区");const json=await fetch(`http://127.0.0.1:40215/api/sessions/${s.sessionId}/operation-scope`,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({mode,context})}).then(r=>r.json());if(!json.ok)throw new Error(json.error?.message||"操作范围设置失败");await fetchSessions();});}
$("projectPickerButton").onclick=()=>openPicker("projectPickerMenu","projectFilter");$("threadPickerButton").onclick=()=>openPicker("threadPickerMenu","threadFilter");$("projectFilter").oninput=renderProjects;$("threadFilter").oninput=renderThreads;document.addEventListener("click",e=>{if(!$("projectPicker").contains(e.target))closePicker("projectPickerMenu");if(!$("threadPicker").contains(e.target))closePicker("threadPickerMenu");});
$("refreshAll").onclick=()=>withFeedback($("refreshAll"),"刷新中...","已刷新",async()=>{await fetchCatalog(true);await fetchSessions();});$("refreshProjects").onclick=()=>withFeedback($("refreshProjects"),"同步中...","已同步",()=>fetchCatalog(true));$("refreshThreads").onclick=()=>withFeedback($("refreshThreads"),"同步中...","已同步",()=>fetchCatalog(true));$("saveBinding").onclick=()=>saveBinding($("saveBinding"));$("clearBinding").onclick=()=>clearBinding($("clearBinding"));$("confirmScope").onclick=()=>setOperationScope("selection",$("confirmScope"));$("clearScope").onclick=()=>setOperationScope("document",$("clearScope"));window.addEventListener("wpsConnectorStateChanged",()=>fetchSessions().catch(()=>{}));
Promise.resolve().then(async()=>{try{await fetchCatalog();await fetchSessions();setFeedback("已就绪。");}catch(e){setFeedback(e.message||String(e));setStatus("加载失败");}finally{renderHeader();renderPickers();}});
</script>
</body>
</html>
